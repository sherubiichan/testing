<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcane Archives - Fantasy Library</title>
    <link rel="stylesheet" href="stylegoog.css">
</head>
<body>

    <header class="library-header">
        <h1>The Arcane Archives</h1>
        <p>Your portal to mystical realms and ancient grimoires.</p>
    </header>

    <main class="bookshelf-container">
        <!-- Shelf 1 -->
        <div class="shelf">
            <div class="books">
                <!-- target="_blank" guarantees it opens in a clean new browser tab -->
                <a href="https://example.com" target="_blank" class="book spine-red" style="height: 220px;" title="The Tome of Dragons">
                    <span class="book-title">Ancient Art</span>
                </a>
                <a href="https://example.com" target="_blank" class="book spine-gold" style="height: 200px;" title="Elven Lore">
                    <span class="book-title">Elves</span>
                </a>
                <a href="https://example.com" target="_blank" class="book spine-purple" style="height: 240px;" title="Spellbook of Shadows">
                    <span class="book-title">Shadows</span>
                </a>
                <a href="https://example.com" target="_blank" class="book spine-blue" style="height: 210px;" title="The Ocean's Magic">
                    <span class="book-title">Oceans</span>
                </a>
                  <a href="https://example.com" target="_blank" class="book spine-wizard" style="height: 230px; width: 90px;" title="The Man's Magic">
                    <span class="book-title">Humans</span>
                </a>
                  <a href="https://example.com" target="_blank" class="book spine-leather" style="height: 230px; width: 90px;" title="Plasma's Magic">
                    <span class="book-title">Ghosts</span>
                </a>
            </div>
            <div class="shelf-board"></div>
        </div>

        <!-- Shelf 2 -->
        <div class="shelf">
            <div class="books">
                <a href="https://example.com" target="_blank" class="book spine-green" style="height: 230px;" title="Forest Herbalism">
                    <span class="book-title">Herbs</span>
                </a>
                <a href="https://example.com" target="_blank" class="book spine-black" style="height: 250px;" title="Dark Arts & Runes">
                    <span class="book-title">Runes</span>
                </a>
                <a href="https://example.com" target="_blank" class="book spine-teal" style="height: 205px;" title="The Astral Plane">
                    <span class="book-title">Astral</span>
                </a>
            </div>
            <div class="shelf-board"></div>
        </div>
    </main>

</body>
</html>
