<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcane Archives - Fantasy Library</title>
    <link rel="stylesheet" href="stylegoog.css">
</head>
<body>

    <!-- Particle container for the sparks -->
    <div id="particle-container"></div>

    <header class="library-header">
        <h1>The Arcane Archives</h1>
        <p>Your portal to mystical realms and ancient grimoires.</p>
    </header>

    <main class="bookshelf-container">
        <!-- Shelf 1 -->
        <div class="shelf">
            <div class="books">
                <div class="book spine-red" style="height: 220px;" title="The Tome of Dragons">
                    <span class="book-title">Ancient Art</span>
                </div>
                <div class="book spine-gold" style="height: 200px;" title="Elven Lore">
                    <span class="book-title">Elves</span>
                </div>
                <div class="book spine-purple" style="height: 240px;" title="Spellbook of Shadows">
                    <span class="book-title">Shadows</span>
                </div>
                <div class="book spine-blue" style="height: 210px;" title="The Ocean's Magic">
                    <span class="book-title">Oceans</span>
                </div>
            </div>
            <div class="shelf-board"></div>
        </div>

        <!-- Shelf 2 -->
        <div class="shelf">
            <div class="books">
                <div class="book spine-green" style="height: 230px;" title="Forest Herbalism">
                    <span class="book-title">Herbs</span>
                </div>
                <div class="book spine-black" style="height: 250px;" title="Dark Arts & Runes">
                    <span class="book-title">Runes</span>
                </div>
                <div class="book spine-teal" style="height: 205px;" title="The Astral Plane">
                    <span class="book-title">Astral</span>
                </div>
            </div>
            <div class="shelf-board"></div>
        </div>
    </main>

    <!-- Inline Script to ensure execution -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('particle-container');
            
            if (!container) {
                console.error("Spark container missing!");
                return;
            }

            function createSpark() {
                const spark = document.createElement('div');
                spark.classList.add('spark');

                const size = Math.random() * 5 + 3;
                spark.style.width = `${size}px`;
                spark.style.height = `${size}px`;
                spark.style.left = `${Math.random() * 100}vw`;

                const duration = Math.random() * 7 + 8;
                spark.style.animationDuration = `${duration}s`;

                const sway = (Math.random() * 100 - 50) + 'px';
                spark.style.setProperty('--sway', sway);

                if (Math.random() > 0.6) {
                    spark.style.background = 'radial-gradient(circle, #fff 0%, #a855f7 50%, transparent 100%)';
                    spark.style.filter = 'drop-shadow(0 0 5px rgba(168, 85, 247, 0.8))';
                }

                container.appendChild(spark);

                setTimeout(() => {
                    spark.remove();
                }, duration * 1000);
            }

            // Start spawning sparks immediately
            setInterval(createSpark, 300);
        });
        /* --- Spark Particle Styles --- */
#particle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

.spark {
    position: absolute;
    bottom: -10px;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(212,175,55,0.8) 40%, rgba(139,92,246,0) 100%);
    border-radius: 50%;
    filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.8));
    animation: driftUpwards linear forwards;
}

@keyframes driftUpwards {
    0% {
        transform: translateY(0) translateX(0) scale(0.5);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(-105vh) translateX(var(--sway, 30px)) scale(1.2);
        opacity: 0;
    }
}

    </script>
</body>
</html>
